
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent}
#wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:12px 0}
#hud{display:flex;gap:10px;width:420px}
.hud-card{flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 14px}
.hud-label{font-size:11px;color:var(--color-text-secondary);letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.hud-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.hud-val span{font-size:13px;font-weight:400;color:var(--color-text-secondary);margin-left:4px}
#c{display:block;border-radius:16px;border:0.5px solid var(--color-border-tertiary);cursor:pointer}
#hint{font-size:12px;color:var(--color-text-tertiary)}
</style>
<div id="wrap">
  <div id="hud">
    <div class="hud-card"><div class="hud-label">Score</div><div class="hud-val" id="scoreEl">0</div></div>
    <div class="hud-card"><div class="hud-label">Best</div><div class="hud-val" id="bestEl">0<span id="newEl" style="display:none">new!</span></div></div>
    <div class="hud-card"><div class="hud-label">Games</div><div class="hud-val" id="gamesEl">0</div></div>
  </div>
  <canvas id="c" width="420" height="520"></canvas>
  <div id="hint">tap · click · space to flap</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const scoreEl=document.getElementById('scoreEl'),bestEl=document.getElementById('bestEl'),gamesEl=document.getElementById('gamesEl'),newEl=document.getElementById('newEl');

const BIRDS=['🐔','🦆','🐧','🦜','🐦','🦩','🦚'];
const EXCLAIM=['YIKES!','OH NO!','BRUH!','NOOO!','WHY!?','BONK!','OOF!','DEAD!'];
const TAUNTS=['skill issue','touch grass','git gud','L + ratio','try harder','rip bozo','not even close'];

const THEMES=[
  {sky:'#dbeafe',skyMid:'#bfdbfe',ground:'#4ade80',groundTop:'#86efac',cloud:'rgba(255,255,255,0.85)',pipeBody:'#22c55e',pipeLip:'#4ade80',pipeStroke:'#15803d',star:'#fbbf24'},
  {sky:'#fce7f3',skyMid:'#fbcfe8',ground:'#f472b6',groundTop:'#f9a8d4',cloud:'rgba(255,255,255,0.8)',pipeBody:'#a855f7',pipeLip:'#c084fc',pipeStroke:'#7e22ce',star:'#fde68a'},
  {sky:'#fef9c3',skyMid:'#fef08a',ground:'#fb923c',groundTop:'#fdba74',cloud:'rgba(255,255,255,0.8)',pipeBody:'#f97316',pipeLip:'#fb923c',pipeStroke:'#c2410c',star:'#c084fc'},
  {sky:'#ccfbf1',skyMid:'#99f6e4',ground:'#2dd4bf',groundTop:'#5eead4',cloud:'rgba(255,255,255,0.85)',pipeBody:'#0891b2',pipeLip:'#22d3ee',pipeStroke:'#0e7490',star:'#fbbf24'},
];

let bird,pipes,score,state,frame,theme,emoji,exclaim,taunt,particles,stars,highScore,games,newRecord;
highScore=0;games=0;

function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}

function init(){
  bird={x:90,y:H/2,vy:0,r:22,rot:0,squish:1};
  pipes=[];score=0;frame=0;
  state='waiting';
  theme=rnd(THEMES);
  emoji=rnd(BIRDS);
  exclaim=rnd(EXCLAIM);
  taunt=rnd(TAUNTS);
  particles=[];
  newRecord=false;
  stars=Array.from({length:18},()=>({x:Math.random()*W,y:Math.random()*(H*0.55),r:1+Math.random()*2.5,blink:Math.random()*Math.PI*2}));
  scoreEl.textContent='0';
  newEl.style.display='none';
}

function flap(){
  if(state==='dead')return;
  if(state==='waiting')state='playing';
  bird.vy=-9;
  bird.squish=0.7;
}

canvas.addEventListener('click',e=>{
  if(state==='dead'){
    const r=canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
    if(mx>W/2-75&&mx<W/2+75&&my>H/2+105&&my<H/2+148){init();return;}
  }
  flap();
});
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});

function spawnPipe(){
  const gap=145,minY=90,maxY=H-110-gap;
  const topH=minY+Math.random()*(maxY-minY);
  pipes.push({x:W+30,topH,botY:topH+gap,w:58,scored:false,wobble:0});
}

function boom(x,y){
  for(let i=0;i<16;i++){
    const a=(Math.PI*2/16)*i,spd=3+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,size:4+Math.random()*4,color:['#f87171','#fbbf24','#34d399','#60a5fa','#f472b6','#a78bfa'][Math.floor(Math.random()*6)]});
  }
}

function update(){
  frame++;
  if(state==='playing'){
    bird.vy+=0.48;
    bird.y+=bird.vy;
    bird.rot=Math.max(-28,Math.min(85,bird.vy*4));
    bird.squish=Math.min(1,bird.squish+0.08);

    const interval=Math.max(60,90-Math.floor(score/5)*3);
    if(frame%interval===0)spawnPipe();

    for(let p of pipes){
      p.x-=3+(score*0.05);
      if(!p.scored&&p.x+p.w<bird.x){p.scored=true;score++;scoreEl.textContent=score;boom(p.x+p.w/2,p.topH+72);}
      const bx=bird.x,by=bird.y,br=bird.r-6;
      if(bx+br>p.x&&bx-br<p.x+p.w){if(by-br<p.topH||by+br>p.botY)die();}
    }
    pipes=pipes.filter(p=>p.x>-80);
    if(bird.y-bird.r>H||bird.y+bird.r<0)die();
  }
  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.025;}
  particles=particles.filter(p=>p.life>0);
}

function die(){
  state='dead';games++;
  boom(bird.x,bird.y);boom(bird.x+10,bird.y-10);
  exclaim=rnd(EXCLAIM);taunt=rnd(TAUNTS);
  gamesEl.textContent=games;
  if(score>highScore){highScore=score;newRecord=true;newEl.style.display='inline';}
  bestEl.firstChild.textContent=highScore;
}

function drawRR(x,y,w,h,r,fill,stroke,lw){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1.5;ctx.stroke();}
}

function draw(){
  const t=theme;
  ctx.fillStyle=t.sky;ctx.fillRect(0,0,W,H);

  ctx.fillStyle=t.skyMid;
  ctx.fillRect(0,H*0.45,W,H*0.2);

  for(let s of stars){
    s.blink+=0.04;
    const a=0.4+0.4*Math.sin(s.blink);
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }

  const cloudOff=(frame*0.4)%W;
  [[cloudOff,50,0.85],[cloudOff-120,90,0.7],[cloudOff+180,35,0.6],[cloudOff-60,130,0.5]].forEach(([cx,cy,a])=>{
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath();ctx.ellipse((cx%W+W)%W,cy,50,22,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(((cx+30)%W+W)%W,cy-10,32,18,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(((cx-22)%W+W)%W,cy-5,28,15,0,0,Math.PI*2);ctx.fill();
  });

  for(let p of pipes){
    ctx.fillStyle=t.pipeBody;
    ctx.strokeStyle=t.pipeStroke;
    ctx.lineWidth=1.5;
    drawRR(p.x,0,p.w,p.topH,[0,0,10,10],t.pipeBody,t.pipeStroke);
    drawRR(p.x-6,p.topH-20,p.w+12,24,6,t.pipeLip,t.pipeStroke);
    ctx.font='18px serif';ctx.textAlign='center';
    ctx.fillText('😤',p.x+p.w/2,p.topH-26);

    drawRR(p.x,p.botY,p.w,H-p.botY,[10,10,0,0],t.pipeBody,t.pipeStroke);
    drawRR(p.x-6,p.botY-4,p.w+12,24,6,t.pipeLip,t.pipeStroke);
    ctx.fillText('😤',p.x+p.w/2,p.botY+30);
  }

  ctx.fillStyle=t.ground;ctx.fillRect(0,H-28,W,28);
  ctx.fillStyle=t.groundTop;ctx.fillRect(0,H-28,W,6);
  ctx.fillStyle='rgba(255,255,255,0.25)';
  for(let i=0;i<W;i+=48){
    const gx=((i-(frame*2.5))%W+W)%W;
    ctx.fillRect(gx,H-26,18,4);
  }

  for(let p of particles){
    ctx.save();ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(bird.x,bird.y);
  ctx.rotate(bird.rot*Math.PI/180);
  ctx.scale(bird.squish+(1-bird.squish)*0.5, 2-bird.squish-(2-bird.squish)*0.5+0.5);
  const bob=state==='playing'?Math.sin(frame*0.28)*2.5:Math.sin(frame*0.05)*3;
  ctx.font='44px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(emoji,0,bob);
  ctx.restore();

  if(state==='waiting'){
    ctx.fillStyle='rgba(0,0,0,0.38)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.font='bold 34px sans-serif';
    ctx.fillText('Flappy Chaos',W/2,H/2-80);
    ctx.font='54px serif';ctx.fillText(emoji,W/2,H/2-10);
    ctx.font='16px sans-serif';ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillText('tap or space to flap',W/2,H/2+55);
    drawRR(W/2-70,H/2+78,140,40,10,'rgba(255,255,255,0.18)','rgba(255,255,255,0.5)',1);
    ctx.fillStyle='#fff';ctx.font='15px sans-serif';ctx.fillText('best: '+highScore,W/2,H/2+98);
  }

  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';

    drawRR(W/2-140,H/2-145,280,300,18,'rgba(255,255,255,0.97)','rgba(0,0,0,0.08)',1);

    ctx.fillStyle='#ef4444';ctx.font='bold 38px sans-serif';
    ctx.fillText(exclaim,W/2,H/2-100);

    ctx.font='52px serif';ctx.fillText(emoji,W/2,H/2-42);

    ctx.fillStyle='#64748b';ctx.font='15px sans-serif';
    ctx.fillText(taunt,W/2,H/2+8);

    ctx.fillStyle='#1e293b';ctx.font='bold 28px sans-serif';
    ctx.fillText('score: '+score,W/2,H/2+48);

    if(newRecord){
      ctx.fillStyle='#f59e0b';ctx.font='bold 15px sans-serif';
      ctx.fillText('✦ new best! ✦',W/2,H/2+76);
    }

    const btnY=H/2+100;
    drawRR(W/2-75,btnY,150,44,10,'#1e293b',null);
    ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';
    ctx.fillText('play again',W/2,btnY+22);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
init();loop();
</script>
